<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personaliza tu Pedido | O3D-PRINT</title>
    <link rel="stylesheet" href="../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .final-container {
            max-width: 500px;
            width: 90%;
            padding: 40px;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid var(--primary);
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 102, 0, 0.15);
            backdrop-filter: blur(10px);
        }

        .success-icon {
            font-size: 3.5rem;
            color: #00ff88;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        h2 {
            font-family: 'Orbitron';
            color: white;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .resumen-caja {
            background: rgba(255, 102, 0, 0.05);
            border: 1px dashed var(--primary);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .resumen-caja p {
            margin: 5px 0;
            font-size: 0.9rem;
            color: #bbb;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .input-group input, .input-group textarea {
            background: #000;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
            outline: none;
        }

        .input-group input:focus, .input-group textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(255, 102, 0, 0.2);
        }

        textarea {
            resize: none;
            height: 100px;
        }

        .btn-send {
            background: var(--primary);
            color: black;
            font-family: 'Orbitron';
            font-weight: 800;
            padding: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .btn-send:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 102, 0, 0.3);
            filter: brightness(1.1);
        }

        ::placeholder {
            color: #555;
        }
    </style>
</head>
<body>
    <div class="final-container" id="main-content" style="display:none;">
        <div class="success-icon">✔</div>
        <h2>PAGO RECIBIDO</h2>
        
        <div class="resumen-caja">
            <p>Has pedido: <strong id="resumen-articulos" style="color:white;">-</strong></p>
            <p>Total: <strong id="resumen-total" style="color:var(--primary);">-</strong></p>
        </div>

        <div class="input-group">
            <input type="text" id="u-nombre" placeholder="Nombre completo" required>
            <input type="email" id="u-email" placeholder="Email de contacto (El mismo con el que has pagado)" required>
            <textarea id="u-notas" placeholder="Instrucciones: ¿De qué color lo quieres? ¿Algún detalle especial?" required></textarea>
        </div>
        
        <button class="btn-send" onclick="enviarPersonalizacion()">ENVIAR CONFIGURACIÓN</button>
    </div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const totalGuardado = localStorage.getItem('totalO3D');
    const articulosGuardados = localStorage.getItem('articulosO3D');

    // 1. Lógica de Seguridad y Validación de Importe
    function validarAcceso() {
        // ¿Viene de Stripe o tiene la sesión activa?
        const tieneAcceso = urlParams.get('pagado') === 'yes' || localStorage.getItem('acceso_permitido') === 'true';
        
        // ¿El precio es válido y mayor que cero?
        const tieneImporteValido = totalGuardado && parseInt(totalGuardado) > 0;

        if (tieneAcceso && tieneImporteValido) {
            // Todo OK: Guardamos acceso, limpiamos URL y mostramos contenido
            localStorage.setItem('acceso_permitido', 'true');
            window.history.replaceState({}, document.title, window.location.pathname);
            
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('resumen-articulos').innerText = articulosGuardados;
            document.getElementById('resumen-total').innerText = totalGuardado + "€";
        } else {
            // Si algo falla, mensaje de aviso y vuelta a la tienda
            if (!tieneImporteValido && tieneAcceso) {
                alert("No hay productos detectados en tu pedido. Volviendo a la tienda...");
            }
            window.location.href = "../";
        }
    }

    // Ejecutamos la validación nada más cargar
    validarAcceso();

    async function enviarPersonalizacion() {
        const nombre = document.getElementById('u-nombre').value;
        const email = document.getElementById('u-email').value;
        const notas = document.getElementById('u-notas').value;

        if (!nombre || !email || !notas) return alert("Por favor, completa todos los campos.");

        const datos = {
            nombre: nombre,
            email: email,
            notas: notas,
            total: totalGuardado + "€",
            articulos: articulosGuardados,
            estado: "PAGADO_STRIPE"
        };

        // SUSTITUYE ESTO POR TU URL REAL DE GOOGLE APPS SCRIPT
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyulcHYSz_OD3GRKXU7RCZkxFm9pY5Xi_afdZJW_BoyEI0hK0WaWDYV3Sy1We4Sq9tf/exec";

        alert("¡Perfecto! Enviando especificaciones...");

        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos) });
            // Limpieza total tras el éxito
            localStorage.clear();
            window.location.href = "../";
        } catch (e) {
            alert("Hubo un error al conectar. Prueba otra vez.");
        }
    }
</script>
</body>
</html>
