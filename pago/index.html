<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Pedido | O3D-PRINT</title>
    <link rel="stylesheet" href="../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="../favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon/favicon-16x16.png">
    <link rel="manifest" href="../favicon/site.webmanifest">
    <style>
        .checkout-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%); }
        .checkout-card { background: var(--card); border: 1px solid var(--primary); padding: 40px; border-radius: 20px; width: 100%; max-width: 500px; text-align: center; box-shadow: 0 0 30px rgba(255, 102, 0, 0.1); }
        .total-amount { font-family: 'Orbitron'; font-size: 3rem; color: var(--primary); margin: 20px 0; text-shadow: 0 0 15px rgba(255, 102, 0, 0.3); }
        .btn-stripe { background: #635bff; color: white; padding: 15px; border-radius: 8px; border: none; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1.1rem; transition: 0.3s; margin-top: 20px; }
        .btn-stripe:hover { background: #7a73ff; transform: translateY(-2px); }
        #form-envio { display: none; margin-top: 30px; border-top: 1px solid #222; padding-top: 30px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="checkout-page">
        <div class="checkout-card">
            <h2 style="font-family: 'Orbitron'; letter-spacing: 2px;">RESUMEN</h2>
            <div class="total-amount" id="render-total">0€</div>
            <p style="opacity: 0.6; margin-bottom: 20px;">Estás a un paso de materializar tus ideas.</p>

            <button class="btn-stripe" onclick="abrirPasarela()">
                <span>Pagar con Tarjeta</span>
            </button>

            <div id="form-envio">
                <h3 style="font-family: 'Orbitron'; font-size: 1rem; margin-bottom: 15px; color: var(--primary);">DATOS DE ENVÍO</h3>
                <div class="input-group">
                    <input type="text" id="u-nombre" placeholder="Nombre completo" required>
                    <input type="email" id="u-email" placeholder="Email" required>
                    <input type="text" id="u-id-pago" placeholder="Confirmación de pago (Nombre/ID)" required>
                    <textarea id="u-notas" placeholder="Dirección de envío y detalles..."></textarea>
                </div>
                <button class="btn-send" onclick="enviarTodo()">FINALIZAR PEDIDO</button>
            </div>
        </div>
    </div>

    <script>
        const total = localStorage.getItem('totalO3D') || 0;
        document.getElementById('render-total').innerText = total + "€";

function abrirPasarela() {
    const total = parseInt(localStorage.getItem('totalO3D'));
    let stripeUrl = "";

    // Aquí pegas tus enlaces de Stripe según el precio
    switch (total) {
        case 1: stripeUrl = "https://buy.stripe.com/fZu9AT0HNd5F2FW7YQdEs00"; break;
        case 2: stripeUrl = "https://buy.stripe.com/6oU4gzfCHe9Jbcs2EwdEs01"; break;
        case 3: stripeUrl = "https://buy.stripe.com/9B6eVd8af4z9fsIgvmdEs02"; break;
        case 4: stripeUrl = "https://buy.stripe.com/dRmaEXeyD0iT1BS5QIdEs03"; break;
        case 5: stripeUrl = "https://buy.stripe.com/3cI00j9ej8Pp1BSgvmdEs04"; break;
        // Puedes seguir hasta el importe máximo que creas que alguien te va a comprar
        default: 
            stripeUrl = "https://buy.stripe.com/9B6fZh0HN2r1cgw1AsdEs05"; // Por si acaso
    }

    if (stripeUrl !== "") {
        window.location.href = stripeUrl;
    } else {
        alert("Error con el importe. Contacta con nosotros.");
    }
}

        async function enviarTodo() {
            const nombre = document.getElementById('u-nombre').value;
            if (!nombre || !document.getElementById('u-id-pago').value) return alert("Rellena los datos");

            const datos = {
                nombre: nombre,
                email: document.getElementById('u-email').value,
                idpago: document.getElementById('u-id-pago').value,
                notas: document.getElementById('u-notas').value,
                total: total + "€",
                articulos: localStorage.getItem('articulosO3D')
            };

            // URL de tu Google Apps Script
            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyulcHYSz_OD3GRKXU7RCZkxFm9pY5Xi_afdZJW_BoyEI0hK0WaWDYV3Sy1We4Sq9tf/exec";

            alert("¡Pedido enviado correctamente!");
            
            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos) });

            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
