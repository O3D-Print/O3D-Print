<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personaliza tu Pedido | O3D-PRINT</title>
    <link rel="stylesheet" href="../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="../favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon/favicon-16x16.png">
    <link rel="manifest" href="../favicon/site.webmanifest">
    <style>
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .final-container {
            max-width: 500px;
            width: 90%;
            padding: 40px;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid var(--primary);
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 102, 0, 0.15);
            backdrop-filter: blur(10px);
        }

        .success-icon {
            font-size: 3.5rem;
            color: #00ff88;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        h2 {
            font-family: 'Orbitron';
            color: white;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .resumen-caja {
            background: rgba(255, 102, 0, 0.05);
            border: 1px dashed var(--primary);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .resumen-caja p {
            margin: 5px 0;
            font-size: 0.9rem;
            color: #bbb;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .input-group input, .input-group textarea {
            background: #000;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
            outline: none;
        }

        .input-group input:focus, .input-group textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(255, 102, 0, 0.2);
        }

        textarea {
            resize: none;
            height: 100px;
        }

        .btn-send {
            background: var(--primary);
            color: black;
            font-family: 'Orbitron';
            font-weight: 800;
            padding: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .btn-send:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 102, 0, 0.3);
            filter: brightness(1.1);
        }

        ::placeholder {
            color: #555;
        }
    </style>
</head>
<body>
    <div class="final-container" id="main-content" style="display:none;">
        <div class="success-icon">✔</div>
        <h2>PEDIDO RECIBIDO</h2>
        
        <div class="resumen-caja">
            <p>Has pedido: <strong id="resumen-articulos" style="color:white;">-</strong></p>
            <p>Total: <strong id="resumen-total" style="color:var(--primary);">-</strong></p>
        </div>

        <div class="input-group">
            <input type="text" id="u-nombre" placeholder="Nombre completo" required>
            <input type="email" id="u-email" placeholder="Email de contacto" required>
            <textarea id="u-notas" placeholder="Instrucciones: ¿De qué color lo quieres? ¿Algún detalle especial?" required></textarea>
        </div>
        
        <button class="btn-send" onclick="enviarPersonalizacion()">ENVIAR CONFIGURACIÓN</button>
    </div>

<script>
    // 1. Quitamos la validación de seguridad de Stripe
    // Solo recuperamos los datos del carrito POR SI ACASO el usuario viene de la web
    const totalGuardado = localStorage.getItem('totalO3D') || "A consultar";
    const articulosGuardados = localStorage.getItem('articulosO3D') || "No especificados";

    // Mostramos el contenido siempre, ya que este es el documento de "envío por correo"
    document.getElementById('main-content').style.display = 'block';
    
    // Si hay algo en el carrito lo mostramos, si no, ponemos "Personalizado"
    document.getElementById('resumen-articulos').innerText = articulosGuardados;
    document.getElementById('resumen-total').innerText = totalGuardado + (totalGuardado !== "A consultar" ? "€" : "");

async function enviarPersonalizacion() {
        const nombre = document.getElementById('u-nombre').value;
        const email = document.getElementById('u-email').value;
        const notas = document.getElementById('u-notas').value;

        if (!nombre || !email || !notas) return alert("Por favor, completa todos los campos.");

        // Detectamos si hay un precio real o si está vacío
        const precioTexto = (totalGuardado && totalGuardado !== "0") ? totalGuardado + "€" : "A consultar";

        const datos = {
            nombre: nombre,
            email: email,
            notas: notas,
            // Aquí combinamos el precio con el aviso de NO PAGADO
            total: precioTexto + " (⚠️ ATENCIÓN: NO PAGADO AÚN)", 
            articulos: articulosGuardados || "Pedido personalizado",
            estado: "SOLICITUD_SIN_PAGO"
        };

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyulcHYSz_OD3GRKXU7RCZkxFm9pY5Xi_afdZJW_BoyEI0hK0WaWDYV3Sy1We4Sq9tf/exec";

        alert("Enviando solicitud de presupuesto..., pulse OK y espere unos segundos");

        try {
            await fetch(SCRIPT_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(datos) 
            });
            
            alert("¡Solicitud enviada! Te contactaremos para gestionar el pago del/los " + precioTexto);
            localStorage.clear();
            window.location.href = "../";
        } catch (e) {
            alert("Error al enviar.");
        }
    }
</script>
</body>
</html>
